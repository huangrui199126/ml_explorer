name: MLExplorer
options:
  bundleIdPrefix: com.mlexplorer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

targets:
  MLExplorer:
    type: application
    platform: iOS
    sources:
      - MLExplorer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mlexplorer.app
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: MLExplorer/Info.plist
